<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Config Knowledge Map</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Config Knowledge Map</h1>
    <span id="current-file-label" class="current-file-label">No file loaded</span>
    <div class="header-right">
      <div class="ai-badge" aria-label="AI development usage">
        <svg class="ai-badge-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="5" r="2.3" />
          <circle cx="5" cy="18" r="2.3" />
          <circle cx="19" cy="18" r="2.3" />
          <path d="M12 7.3 6.7 15.8M12 7.3l5.3 8.5M7.5 18h9" />
        </svg>
        <span class="ai-badge-copy">
          <span>AI-assisted Build</span>
          <em>Made with Ona &middot; Claude Sonnet 5</em>
          <small>Design, implementation &amp; docs</small>
        </span>
      </div>
      <span id="annotated-count" class="annotated-count"></span>
    </div>
  </header>

  <section class="toolbar">
    <div class="toolbar-group">
      <label for="dir-input">Folder</label>
      <input id="dir-input" type="text" placeholder="./prefs (default)" />
      <button id="scan-btn">Scan</button>
    </div>

    <div class="toolbar-group">
      <label for="file-select">.pref files</label>
      <select id="file-select"></select>
      <button id="load-selected-btn">Load</button>
    </div>

    <div class="toolbar-group">
      <label for="file-upload">Or upload</label>
      <input id="file-upload" type="file" accept=".pref,.properties,.txt" />
    </div>

    <div class="toolbar-group toolbar-group--search">
      <label for="search-input">Search</label>
      <input id="search-input" type="text" placeholder="Filter by key, value, description, tag..." />
    </div>

    <div class="toolbar-group toolbar-group--group-filter">
      <label for="group-filter-select">Group</label>
      <select id="group-filter-select">
        <option value="">All fields</option>
      </select>
    </div>

    <div class="toolbar-group toolbar-group--views">
      <button id="view-table-btn" class="view-btn">Table</button>
      <button id="view-graph-btn" class="view-btn">Graph</button>
    </div>
  </section>

  <section id="groups-bar" class="groups-bar">
    <span class="groups-bar-label">Groups:</span>
    <span id="groups-chips" class="groups-chips"></span>
    <input id="new-group-name" type="text" placeholder="New group name (e.g. Network Connection)" />
    <button id="new-group-btn">+ Add group</button>
  </section>

  <main class="main-layout">
    <div id="table-view" class="table-view">
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Value</th>
            <th>Description</th>
            <th>Tags</th>
            <th>Groups</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div id="graph-view" class="graph-view hidden">
      <button id="fit-view-btn" class="graph-fit-btn">Fit to view</button>
      <div id="graph-legend" class="graph-legend"></div>
    </div>

    <aside id="detail-panel" class="detail-panel hidden">
      <h2 id="detail-key">—</h2>
      <div class="detail-row">
        <span class="detail-label">Value</span>
        <span id="detail-value" class="detail-value">—</span>
      </div>
      <div class="detail-row">
        <label for="detail-description">Description</label>
        <textarea id="detail-description" rows="4" placeholder="What does this field mean?"></textarea>
      </div>
      <div class="detail-row">
        <label for="detail-tags">Tags (comma separated)</label>
        <input id="detail-tags" type="text" placeholder="ui, timeout, deprecated..." />
      </div>
      <div class="detail-row">
        <label>Groups</label>
        <div id="detail-groups" class="detail-groups"></div>
      </div>
      <button id="save-annotation-btn">Save annotation</button>
    </aside>
  </main>

  <footer id="status-bar" class="status-bar">Ready.</footer>

  <script src="js/parser.js"></script>
  <script src="js/annotations.js"></script>
  <script src="js/groups.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
